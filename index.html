<!DOCTYPE html>
<html x-data="app" :lang="lang" :dir="lang === 'he' ? 'rtl' : 'ltr'" :class="{ 'dark': darkMode }" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title x-text="translations[lang].title + ': ' + translations[lang].subtitle"></title>
    <link rel="icon" type="image/png" href="Images/a-bloq-logo.png">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <!-- JS Modules -->
    <script src="js/translations.js"></script>
    <script src="js/app.js"></script>
    
    <!-- Alpine.js & Marked.js (Markdown) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body x-cloak>
    <!-- Shutter Loader -->
    <div id="shutter-loader" class="fixed inset-0 z-[100] bg-m3-surface dark:bg-m3-surface-dark flex items-center justify-center transition-transform duration-700 ease-out">
        <div class="flex flex-col items-center gap-6">
            <div class="w-16 h-16 bg-m3-primary/10 rounded-3xl p-3 animate-pulse">
                <img :src="darkMode ? 'Images/a-bloq-logo-dark.png' : 'Images/a-bloq-logo.png'" alt="A Bloq Lock Logo" class="w-full h-full object-contain">
            </div>
            <div class="h-1 w-48 bg-m3-surface-variant dark:bg-m3-surface-variant-dark rounded-full overflow-hidden">
                <div class="h-full bg-m3-primary animate-[loading_1.5s_infinite_ease-in-out]"></div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 glass px-4 h-[72px] flex items-center justify-between transition-all duration-500 overflow-hidden">
        <div class="flex items-center gap-4 group cursor-pointer shrink-0" @click="window.scrollTo(0,0)">
            <div class="p-2 transition-colors">
                <img alt="A Bloq Lock Logo"
                     :src="darkMode ? 'Images/a-bloq-logo-dark.png' : 'Images/a-bloq-logo.png'"
                     class="w-8 h-8 object-contain transition-opacity hover:opacity-80">
            </div>
            <span class="font-black text-2xl tracking-tighter hidden sm:block text-m3-primary" x-text="translations[lang].title"></span>
        </div>

        
        <div class="hidden lg:flex gap-8 items-center shrink-0">
            <a href="#features" class="text-sm font-bold opacity-70 hover:opacity-100 hover:text-m3-primary transition-all uppercase tracking-widest whitespace-nowrap" x-text="translations[lang].navFeatures"></a>
            <a href="#install" class="text-sm font-bold opacity-70 hover:opacity-100 hover:text-m3-primary transition-all uppercase tracking-widest whitespace-nowrap" x-text="translations[lang].navInstall"></a>
            <a href="#gallery" class="text-sm font-bold opacity-70 hover:opacity-100 hover:text-m3-primary transition-all uppercase tracking-widest whitespace-nowrap" x-text="translations[lang].navGallery"></a>
            <a href="#faq" class="text-sm font-bold opacity-70 hover:opacity-100 hover:text-m3-primary transition-all uppercase tracking-widest whitespace-nowrap" x-text="translations[lang].faqTitle"></a>
        </div>

        <div class="flex items-center gap-1 sm:gap-2 shrink-0">
            <!-- GitHub Link -->
            <a href="https://github.com/sesese1234/SecureGuardMDM" target="_blank" 
               class="p-3 rounded-full hover:bg-m3-surface-variant dark:hover:bg-m3-surface-variant-dark transition-all active:scale-90 m3-ripple"
               title="GitHub">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6">
                    <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
                </svg>
            </a>
            <!-- Theme Toggle -->
            <button @click="toggleTheme()" class="p-3 rounded-full hover:bg-m3-surface-variant dark:hover:bg-m3-surface-variant-dark transition-all active:scale-90 m3-ripple shrink-0">
                <span class="material-symbols-outlined text-2xl" x-text="darkMode ? 'light_mode' : 'dark_mode'"></span>
            </button>
            <!-- Language Toggle -->
            <button @click="lang = lang === 'he' ? 'en' : 'he'" class="flex items-center gap-1 sm:gap-2 px-2 sm:px-4 py-2 rounded-full border border-m3-on-surface-variant/20 hover:bg-m3-surface-variant dark:hover:bg-m3-surface-variant-dark transition-all active:scale-95 m3-ripple shrink-0 whitespace-nowrap">
                <span class="material-symbols-outlined text-xl">language</span>
                <span class="font-bold text-[10px] sm:text-xs uppercase tracking-widest" x-text="lang === 'he' ? 'EN' : 'עברית'"></span>
            </button>
            <!-- Primary CTA -->
            <a href="https://cfopuser.github.io/a-bloq-installer/" target="_blank" class="bg-m3-primary text-m3-on-primary px-4 sm:px-6 py-2.5 rounded-full font-black text-sm flex items-center gap-2 active:scale-95 transition-all shadow-lg hover:shadow-m3-primary/30 m3-ripple uppercase tracking-wider shrink-0 whitespace-nowrap">
                <span class="material-symbols-outlined text-xl">bolt</span>
                <span class="hidden md:inline" x-text="translations[lang].ctaWebPrimary"></span>
            </a>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="max-w-6xl mx-auto px-6 py-12 lg:py-32 flex flex-col lg:flex-row items-center gap-20 lg:gap-32 overflow-visible">
        <div class="flex-1 text-center lg:text-start" x-init="$el.classList.add('visible')">
            <h1 class="text-4xl md:text-8xl font-black text-m3-on-surface dark:text-m3-on-surface-dark mb-6 md:mb-8 tracking-tighter leading-none" x-text="translations[lang].subtitle"></h1>


            <p class="text-xl md:text-2xl text-m3-on-surface-variant mb-12 leading-relaxed max-w-2xl mx-auto lg:mx-0" x-text="translations[lang].description"></p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start items-center">
                <a href="https://cfopuser.github.io/a-bloq-installer/" target="_blank" class="w-full sm:w-auto bg-m3-primary text-m3-on-primary px-10 py-5 rounded-full text-xl font-black flex items-center justify-center gap-4 active:scale-95 transition-all shadow-xl hover:shadow-m3-primary/30 hover:-translate-y-1 m3-ripple">
                    <span class="material-symbols-outlined text-3xl">bolt</span>
                    <span x-text="translations[lang].ctaWebPrimary"></span>
                </a>
                </a>
            </div>
            <p class="mt-8 text-sm opacity-50 font-bold uppercase tracking-[0.2em] flex items-center justify-center lg:justify-start gap-2" x-init="$el.classList.add('visible')">
                <span x-text="translations[lang].freeBadge + ' • ' + translations[lang].navSource"></span>
            </p>
        </div>
        <div class="w-full lg:w-[450px] relative mt-12 lg:mt-0" x-init="$el.classList.add('visible')">
            <div class="absolute -inset-10 bg-gradient-to-tr from-m3-primary/20 to-transparent blur-[100px] rounded-full animate-pulse"></div>
            <div class="relative z-10 p-4 bg-m3-surface-variant/20 backdrop-blur-xl rounded-[4rem] border border-white/20 shadow-2xl">
                <img :src="getImageSrc('setup_welcome')" alt="App Status Screenshot" class="w-full rounded-[3.5rem] shadow-2xl border-4 border-gray-900/10 mx-auto transform hover:scale-[1.02] transition-transform duration-700">
            </div>
            <!-- Floating Decorative Elements (Dynamic Position for RTL) -->
            <div class="absolute z-20 w-40 animate-bounce group" 
                 :class="lang === 'he' ? '-top-10 -right-10 lg:-right-20' : '-top-10 -left-10 lg:-left-20'"
                 style="animation-duration: 4s;">
                <img :src="getImageSrc('status_empty')" class="w-full rounded-2xl shadow-2xl border-4 border-white dark:border-gray-800 rotate-[-12deg] group-hover:rotate-0 transition-transform">
            </div>
            <div class="absolute z-20 w-48 animate-bounce group" 
                 :class="lang === 'he' ? '-bottom-10 -left-10 lg:-left-20' : '-bottom-10 -right-10 lg:-right-20'"
                 style="animation-duration: 5s;">
                <img :src="getImageSrc('settings_app_mgmt')" class="w-full rounded-2xl shadow-2xl border-4 border-white dark:border-gray-800 rotate-12 group-hover:rotate-0 transition-transform">
            </div>
        </div>
    </header>

    <!-- Cool Clean Promo / Advertising Section (MD3 Clarity Card) -->
    <section class="max-w-6xl mx-auto px-6 py-24 text-center overflow-visible" x-init="$el.classList.add('visible')">
        <div class="relative bg-white/40 dark:bg-m3-surface-variant-dark/5 backdrop-blur-2xl rounded-[4rem] p-12 lg:p-24 border border-m3-primary/10 shadow-xl hover:shadow-2xl transition-all duration-700 group overflow-hidden">
            
            <!-- Subtle Clean Background Accents -->
            <div class="absolute top-0 right-0 w-96 h-96 bg-m3-primary/5 blur-[100px] rounded-full -translate-y-1/2 translate-x-1/2"></div>
            <div class="absolute bottom-0 left-0 w-96 h-96 bg-m3-primary/5 blur-[100px] rounded-full translate-y-1/2 -translate-x-1/2"></div>
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-m3-primary to-transparent opacity-30 group-hover:opacity-100 transition-opacity"></div>

            <div class="relative z-10">
                <h2 class="text-3xl md:text-7xl font-black mb-6 md:mb-8 tracking-tighter text-m3-on-surface dark:text-m3-on-surface-dark" x-text="translations[lang].promoTitle"></h2>
                
                <p class="text-lg md:text-4xl font-bold text-m3-primary mb-8 md:mb-12 tracking-tight" x-text="translations[lang].promoSubtitle"></p>

                <p class="text-base md:text-2xl text-m3-on-surface-variant max-w-4xl mx-auto leading-relaxed max-w-3xl mb-12 md:mb-20" x-text="translations[lang].promoDesc"></p>
                
                <!-- Trust Bar: Sophisticated Clean Minimalist Icons -->
                <div class="flex flex-wrap justify-center items-center gap-8 md:gap-32 text-m3-on-surface-variant opacity-40 grayscale group-hover:grayscale-0 group-hover:opacity-100 transition-all duration-1000">
                    <div class="flex flex-col items-center gap-2 md:gap-4">
                        <span class="material-symbols-outlined text-4xl md:text-7xl">gpp_good</span>
                        <span class="text-[8px] md:text-xs font-black uppercase tracking-[0.2em] md:tracking-[0.3em]">Verified</span>
                    </div>
                    <div class="flex flex-col items-center gap-2 md:gap-4 text-m3-primary scale-110 md:scale-125 opacity-100 active:scale-110 transition-transform">
                        <span class="material-symbols-outlined text-4xl md:text-7xl font-fill">lock</span>
                        <span class="text-[8px] md:text-xs font-black uppercase tracking-[0.2em] md:tracking-[0.3em]">Trusted</span>
                    </div>
                    <div class="flex flex-col items-center gap-2 md:gap-4">
                        <span class="material-symbols-outlined text-4xl md:text-7xl">tune</span>
                        <span class="text-[8px] md:text-xs font-black uppercase tracking-[0.2em] md:tracking-[0.3em]">Advanced</span>
                    </div>
                    <div class="flex flex-col items-center gap-2 md:gap-4">
                        <span class="material-symbols-outlined text-4xl md:text-7xl">payments</span>
                        <span class="text-[8px] md:text-xs font-black uppercase tracking-[0.2em] md:tracking-[0.3em]" x-text="translations[lang].trustFree"></span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Features Grid -->
    <section id="features" class="max-w-6xl mx-auto px-6 py-24" x-init="$el.classList.add('visible')">
        <h2 class="text-4xl font-black mb-16 text-center lg:text-start" x-text="translations[lang].navFeatures"></h2>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center mb-24">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 order-2 lg:order-1">
                <!-- Hardware Blocking -->
                <div class="m3-card p-10 flex flex-col gap-6 group m3-ripple">
                    <div class="w-16 h-16 bg-m3-primary-container dark:bg-m3-primary-container-dark rounded-3xl flex items-center justify-center text-m3-on-primary-container dark:text-m3-on-primary-container-dark shrink-0">
                        <span class="material-symbols-outlined text-4xl">sensors_off</span>
                    </div>
                    <div>
                        <h3 class="text-2xl font-black mb-3" x-text="translations[lang].featHardware"></h3>
                        <p class="text-m3-on-surface-variant dark:text-m3-on-surface-dark/70 text-lg leading-relaxed" x-text="translations[lang].featHardwareDesc"></p>
                    </div>
                </div>

                <!-- System Security -->
                <div class="m3-card p-10 flex flex-col gap-6 group m3-ripple">
                    <div class="w-16 h-16 bg-m3-secondary-container rounded-3xl flex items-center justify-center text-m3-on-secondary-container shrink-0">
                        <span class="material-symbols-outlined text-4xl">lock_open</span>
                    </div>
                    <div>
                        <h3 class="text-2xl font-black mb-3" x-text="translations[lang].featSecurity"></h3>
                        <p class="text-m3-on-surface-variant dark:text-m3-on-surface-dark/70 text-lg leading-relaxed" x-text="translations[lang].featSecurityDesc"></p>
                    </div>
                </div>

                <!-- App Management -->
                <div class="m3-card p-10 flex flex-col gap-6 group m3-ripple">
                    <div class="w-16 h-16 bg-m3-tertiary/10 rounded-3xl flex items-center justify-center text-m3-tertiary shrink-0">
                        <span class="material-symbols-outlined text-4xl">block</span>
                    </div>
                    <div>
                        <h3 class="text-2xl font-black mb-3" x-text="translations[lang].featApps"></h3>
                        <p class="text-m3-on-surface-variant dark:text-m3-on-surface-dark/70 text-lg leading-relaxed" x-text="translations[lang].featAppsDesc"></p>
                    </div>
                </div>

                <!-- Communication -->
                <div class="m3-card p-10 flex flex-col gap-6 group m3-ripple">
                    <div class="w-16 h-16 bg-m3-primary/10 rounded-3xl flex items-center justify-center text-m3-primary shrink-0">
                        <span class="material-symbols-outlined text-4xl">security</span>
                    </div>
                    <div>
                        <h3 class="text-2xl font-black mb-3" x-text="translations[lang].featComm"></h3>
                        <p class="text-m3-on-surface-variant dark:text-m3-on-surface-dark/70 text-lg leading-relaxed" x-text="translations[lang].featCommDesc"></p>
                    </div>
                </div>

                <!-- Modular Architecture -->
                <div class="m3-card p-10 flex flex-col gap-6 group bg-m3-primary text-m3-on-primary md:col-span-2 m3-ripple">
                    <div class="flex items-center gap-8">
                        <div class="w-20 h-20 bg-white/20 rounded-3xl flex items-center justify-center text-white shrink-0">
                            <span class="material-symbols-outlined text-5xl">extension</span>
                        </div>
                        <div>
                            <h3 class="text-2xl font-black mb-2" x-text="translations[lang].featModular"></h3>
                            <p class="opacity-80 text-xl leading-relaxed" x-text="translations[lang].featModularDesc"></p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="order-1 lg:order-2 flex justify-center">
                <div class="relative group">
                    <div class="absolute -inset-8 bg-m3-primary/20 blur-3xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <img :src="getImageSrc('settings_hardware_network')" alt="Settings Interface" class="relative z-10 w-full max-w-[420px] rounded-[3rem] shadow-2xl border-4 border-white/50 dark:border-gray-800 transform group-hover:rotate-1 transition-transform duration-500">
                </div>
            </div>
        </div>
    </section>

    <!-- Installation Stepper -->
    <section id="install" class="bg-m3-surface-variant/20 dark:bg-m3-surface-variant-dark/5 py-32 overflow-visible" x-init="$el.classList.add('visible')">
        <div class="max-w-6xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-2 gap-24 items-start">
            <div class="relative">
                <div class="sticky top-32">
                    <h2 class="text-5xl font-black mb-8 text-center lg:text-start" x-text="translations[lang].navInstall"></h2>
                    <div class="mb-12 p-6 bg-m3-primary/10 border-l-4 border-m3-primary rounded-2xl">
                        <div class="flex gap-4 items-start">
                            <span class="material-symbols-outlined text-m3-primary">info</span>
                            <p class="text-lg font-bold text-m3-on-surface dark:text-m3-on-surface-dark leading-relaxed" x-text="translations[lang].manualInstallNotice"></p>
                        </div>
                    </div>
                    <p class="text-xl text-m3-on-surface-variant mb-12 text-center lg:text-start leading-relaxed" x-text="translations[lang].manualSetupIntro"></p>
                    <div class="hidden lg:block">
                        <div class="p-8 bg-m3-primary/5 rounded-[3rem] border-2 border-m3-primary/10 relative overflow-hidden group">
                           <div class="absolute top-0 left-0 w-2 h-full bg-m3-primary scale-y-0 group-hover:scale-y-100 transition-transform origin-top duration-500"></div>
                           <img :src="getImageSrc('setup_device_owner')" alt="NetGuard Setup" class="w-full rounded-2xl shadow-2xl transform group-hover:scale-[1.03] transition-transform duration-700">
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="space-y-4">
                <!-- Step 1 -->
                <div class="m3-card p-6 md:p-12 relative overflow-hidden group m3-ripple cursor-pointer">
                    <div class="flex gap-8">
                        <div class="w-14 h-14 bg-m3-primary text-white rounded-2xl flex items-center justify-center font-black text-2xl shrink-0 shadow-lg shadow-m3-primary/20">1</div>
                        <div>
                            <h3 class="text-3xl font-black mb-4" x-text="translations[lang].step1Title"></h3>
                            <p class="text-xl text-m3-on-surface-variant dark:text-m3-on-surface-dark/70 leading-relaxed" x-text="translations[lang].step1Desc"></p>
                        </div>
                    </div>
                </div>

                <!-- Step 2 -->
                <div class="m3-card p-6 md:p-12 relative overflow-hidden group m3-ripple cursor-pointer">
                    <div class="flex gap-8">
                        <div class="w-14 h-14 bg-m3-secondary text-white rounded-2xl flex items-center justify-center font-black text-2xl shrink-0">2</div>
                        <div>
                            <h3 class="text-3xl font-black mb-4" x-text="translations[lang].step2Title"></h3>
                            <p class="text-xl text-m3-on-surface-variant dark:text-m3-on-surface-dark/70 leading-relaxed" x-text="translations[lang].step2Desc"></p>
                        </div>
                    </div>
                </div>

                <!-- Step 3 -->
                <div class="m3-card p-8 md:p-12 relative group border-2 border-m3-primary/20 ring-4 ring-m3-primary/5">
                    <div class="flex gap-8">
                        <div class="w-14 h-14 bg-m3-primary text-white rounded-2xl flex items-center justify-center font-black text-2xl shrink-0">3</div>
                        <div class="flex-1 min-w-0">
                            <h3 class="text-3xl font-black mb-4" x-text="translations[lang].step3Title"></h3>
                            <p class="text-xl text-m3-on-surface-variant mb-8 leading-relaxed" x-text="translations[lang].step3Desc"></p>
                            
                            <div class="rounded-[2rem] overflow-hidden shadow-2xl border border-gray-700/30" x-data="{ copied: false, code: 'adb shell dpm set-device-owner com.secureguard.mdm/.SecureGuardDeviceAdminReceiver' }">
                                <div class="bg-gray-800 px-6 py-4 flex items-center justify-between border-b border-gray-700">
                                    <span class="text-gray-400 text-xs font-mono uppercase tracking-widest">ADB Terminal</span>
                                    <button @click.stop="navigator.clipboard.writeText(code); copied = true; setTimeout(() => copied = false, 2000)" 
                                            class="bg-m3-primary text-m3-on-primary px-5 py-2 rounded-xl flex items-center gap-2 transition-all active:scale-95 text-xs font-black hover:opacity-90">
                                        <span class="material-symbols-outlined text-sm" x-text="copied ? 'check' : 'content_copy'"></span>
                                        <span x-text="copied ? translations[lang].copied : translations[lang].copyBtn"></span>
                                    </button>
                                </div>
                                <pre dir="ltr" class="bg-gray-900 text-green-400 p-8 overflow-x-auto font-mono text-sm leading-relaxed whitespace-pre"><code x-text="code"></code></pre>
                            </div>
                        </div>
                    </div>
                </div>


                <!-- Step 4 -->
                <div class="m3-card p-6 md:p-12 relative overflow-hidden group m3-ripple cursor-pointer">
                    <div class="flex gap-8">
                        <div class="w-14 h-14 bg-m3-secondary text-white rounded-2xl flex items-center justify-center font-black text-2xl shrink-0">4</div>
                        <div>
                            <h3 class="text-3xl font-black mb-4" x-text="translations[lang].step4Title"></h3>
                            <p class="text-xl text-m3-on-surface-variant leading-relaxed" x-text="translations[lang].step4Desc"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- FAQ Section -->
    <section id="faq" class="max-w-4xl mx-auto px-6 py-32" x-data="{ activeFaq: 0 }" x-init="$el.classList.add('visible')">
        <h2 class="text-5xl font-black mb-16 text-center" x-text="translations[lang].faqTitle"></h2>
        <div class="space-y-6">
            <template x-for="i in [1,2,3,4,5,6]" :key="i">
                <div class="m3-card overflow-hidden transition-all duration-500" :class="activeFaq === i ? 'ring-2 ring-m3-primary/30' : ''">
                    <button @click="activeFaq = activeFaq === i ? null : i" class="w-full text-start p-8 flex justify-between items-center group m3-ripple">
                        <span class="text-2xl font-black group-hover:text-m3-primary transition-colors" x-text="translations[lang]['faq'+i+'Q']"></span>
                        <span class="material-symbols-outlined text-3xl transition-transform duration-500 bg-m3-primary/10 p-2 rounded-full" :class="activeFaq === i ? 'rotate-180 bg-m3-primary text-white' : ''">expand_more</span>
                    </button>
                    <div x-show="activeFaq === i" x-collapse>
                        <div class="px-8 pb-8">
                            <div class="h-px bg-m3-on-surface-variant/10 mb-8"></div>
                            <p class="text-xl text-m3-on-surface-variant leading-relaxed" x-html="translations[lang]['faq'+i+'A']"></p>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </section>

    <!-- Community & Support Hub -->
    <section class="max-w-6xl mx-auto px-6 py-24 border-t border-m3-surface-variant">
        <h2 class="text-4xl font-black mb-4 text-center" x-text="translations[lang].installersTitle"></h2>
        <p class="text-xl text-m3-on-surface-variant text-center mb-16" x-text="translations[lang].communityDesc"></p>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Discussion Thread -->
            <a href="https://mitmachim.top/topic/84759/" target="_blank" class="m3-card p-8 flex flex-col gap-6 group hover:-translate-y-2 transition-all m3-ripple">
                <div class="w-14 h-14 bg-m3-primary/10 rounded-2xl flex items-center justify-center text-m3-primary shrink-0">
                    <span class="material-symbols-outlined text-3xl">forum</span>
                </div>
                <div>
                    <h3 class="text-2xl font-black mb-2" x-text="translations[lang].forumMain"></h3>
                    <p class="text-m3-on-surface-variant leading-relaxed" x-text="translations[lang].forumMainDesc"></p>
                </div>
                <div class="mt-auto flex items-center gap-2 text-m3-primary font-bold">
                    <span x-text="translations[lang].forumGo"></span>
                    <span class="material-symbols-outlined text-sm">open_in_new</span>
                </div>
            </a>

            <!-- Version Updates -->
            <a href="https://mitmachim.top/topic/86455/" target="_blank" class="m3-card p-8 flex flex-col gap-6 group hover:-translate-y-2 transition-all m3-ripple">
                <div class="w-14 h-14 bg-m3-secondary/10 rounded-2xl flex items-center justify-center text-m3-secondary shrink-0">
                    <span class="material-symbols-outlined text-3xl">history</span>
                </div>
                <div>
                    <h3 class="text-2xl font-black mb-2" x-text="translations[lang].forumUpdates"></h3>
                    <p class="text-m3-on-surface-variant leading-relaxed" x-text="translations[lang].forumUpdatesDesc"></p>
                </div>
                <div class="mt-auto flex items-center gap-2 text-m3-secondary font-bold">
                    <span x-text="translations[lang].forumUpdatesGo"></span>
                    <span class="material-symbols-outlined text-sm">open_in_new</span>
                </div>
            </a>

            <!-- Web Tool Support -->
            <a href="https://mitmachim.top/topic/93248/" target="_blank" class="m3-card p-8 flex flex-col gap-6 group hover:-translate-y-2 transition-all m3-ripple">
                <div class="w-14 h-14 bg-m3-tertiary/10 rounded-2xl flex items-center justify-center text-m3-tertiary shrink-0">
                    <span class="material-symbols-outlined text-3xl">description</span>
                </div>
                <div>
                    <h3 class="text-2xl font-black mb-2" x-text="translations[lang].forumWeb"></h3>
                    <p class="text-m3-on-surface-variant leading-relaxed" x-text="translations[lang].forumWebDesc"></p>
                </div>
                <div class="mt-auto flex items-center gap-2 text-m3-tertiary font-bold">
                    <span x-text="translations[lang].forumWebGo"></span>
                    <span class="material-symbols-outlined text-sm">open_in_new</span>
                </div>
            </a>
        </div>

        <div class="mt-12 bg-gradient-to-br from-m3-primary to-m3-secondary-container dark:to-m3-primary-container-dark rounded-[3rem] p-1 gap-1">
            <a href="https://cfopuser.github.io/a-bloq-installer/" target="_blank" class="bg-m3-surface dark:bg-m3-surface-dark rounded-[2.8rem] p-6 md:p-10 flex flex-col md:flex-row items-center justify-between gap-8 group hover:shadow-2xl transition-shadow duration-300 m3-ripple">
                <div class="flex items-center gap-6">
                    <div class="w-20 h-20 bg-m3-primary text-m3-on-primary rounded-3xl flex items-center justify-center shadow-xl">
                        <span class="material-symbols-outlined text-5xl">bolt</span>
                    </div>
                    <div>
                        <h3 class="text-3xl font-black mb-2" x-text="translations[lang].webInstaller"></h3>
                        <p class="text-xl text-m3-on-surface-variant" x-text="translations[lang].webInstallerInfo"></p>
                    </div>
                </div>
                <div class="bg-m3-primary text-m3-on-primary px-8 py-4 rounded-full font-black flex items-center gap-3 shadow-lg group-hover:scale-105 transition-transform">
                    <span x-text="translations[lang].ctaWebPrimary"></span>
                    <span class="material-symbols-outlined">arrow_forward</span>
                </div>
            </a>
        </div>
    </section>

    <!-- Screenshots Gallery -->
    <section id="gallery" class="bg-m3-surface-variant/10 dark:bg-m3-surface-variant-dark/5 py-24" x-data="{
        selectedIndex: null,
        get selectedScreenshot() { return this.selectedIndex !== null ? screenshots[this.selectedIndex] : null; },
        open(index) { this.selectedIndex = index; },
        close() { this.selectedIndex = null; },
        prev() { if (this.selectedIndex > 0) this.selectedIndex--; },
        next() { if (this.selectedIndex < screenshots.length - 1) this.selectedIndex++; },
        scroll(dir) {
            const container = document.getElementById('gallery-container');
            container.scrollBy({ left: dir * 300, behavior: 'smooth' });
        }
    }" @keydown.escape.window="close()" @keydown.arrow-left.window="selectedIndex !== null && prev()" @keydown.arrow-right.window="selectedIndex !== null && next()">
        <div class="max-w-6xl mx-auto px-6">
            <h2 class="text-4xl font-black mb-16 text-center" x-text="translations[lang].galleryTitle"></h2>
            
            <div class="relative group">
                <!-- Gallery Scroll Arrows (always visible, correct colors) -->
                <button @click="scroll(-1)" 
                        class="hidden md:flex absolute -left-6 top-1/2 -translate-y-1/2 z-20 w-12 h-12 bg-white dark:bg-m3-surface-variant-dark shadow-xl rounded-full items-center justify-center text-gray-800 dark:text-m3-on-surface-dark opacity-0 group-hover:opacity-100 transition-all hover:scale-110 active:scale-95 border border-gray-200 dark:border-m3-surface-variant-dark">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                <button @click="scroll(1)" 
                        class="hidden md:flex absolute -right-6 top-1/2 -translate-y-1/2 z-20 w-12 h-12 bg-white dark:bg-m3-surface-variant-dark shadow-xl rounded-full items-center justify-center text-gray-800 dark:text-m3-on-surface-dark opacity-0 group-hover:opacity-100 transition-all hover:scale-110 active:scale-95 border border-gray-200 dark:border-m3-surface-variant-dark">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
                <!-- Scrollable Container -->
                <div id="gallery-container" class="flex gap-6 overflow-x-auto pb-12 snap-x scrollbar-none scroll-smooth">
                    <template x-for="(name, index) in screenshots" :key="name">
                        <div class="snap-start shrink-0">
                            <div @click="open(index)" 
                                 class="m3-card overflow-hidden w-[220px] md:w-[280px] hover:scale-[1.02] transition-transform duration-500 shadow-lg dark:shadow-none cursor-pointer m3-ripple">
                                <img :src="getImageSrc(name)" class="w-full h-auto block" loading="lazy">
                            </div>
                        </div>
                    </template>
                </div>
                
                <!-- Scroll Hints -->
                <div class="absolute inset-y-0 left-0 w-16 bg-gradient-to-r from-m3-surface-variant/20 dark:from-m3-surface-dark/60 to-transparent pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <div class="absolute inset-y-0 right-0 w-16 bg-gradient-to-l from-m3-surface-variant/20 dark:from-m3-surface-dark/60 to-transparent pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity"></div>
            </div>
        </div>

        <!-- Screenshots Lightbox -->
        <div x-show="selectedIndex !== null"
             x-transition:enter="transition ease-out duration-250"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="fixed inset-0 z-[110] flex items-center justify-center bg-black/80 backdrop-blur-xl"
             @click.self="close()">
            
            <!-- Modal Card -->
            <div class="relative flex flex-col items-center max-w-sm w-full mx-4" @click.stop>
                
                <!-- Top Bar: name + close button (always in view) -->
                <div class="w-full flex items-center justify-between mb-4 px-1">
                    <p class="text-white text-sm font-bold uppercase tracking-widest opacity-70" x-text="selectedScreenshot?.replace(/_/g, ' ')"></p>
                    <button @click="close()" class="w-10 h-10 rounded-full bg-white/10 hover:bg-m3-primary transition-colors flex items-center justify-center text-white">
                        <span class="material-symbols-outlined text-xl">close</span>
                    </button>
                </div>

                <!-- Image -->
                <img :src="selectedScreenshot ? getImageSrc(selectedScreenshot) : ''" 
                     class="max-h-[75vh] w-auto rounded-3xl shadow-2xl border-2 border-white/10 object-contain">

                <!-- Bottom Nav: Prev / Counter / Next -->
                <div class="flex items-center gap-6 mt-6">
                    <button @click="prev()" 
                            :disabled="selectedIndex === 0"
                            class="w-12 h-12 rounded-full bg-white/10 hover:bg-m3-primary disabled:opacity-30 disabled:cursor-not-allowed transition-all flex items-center justify-center text-white active:scale-90">
                        <span class="material-symbols-outlined" x-text="lang === 'he' ? 'chevron_right' : 'chevron_left'"></span>
                    </button>
                    <span class="text-white/60 text-sm font-mono" x-text="`${selectedIndex + 1} / ${screenshots.length}`"></span>
                    <button @click="next()"
                            :disabled="selectedIndex === screenshots.length - 1"
                            class="w-12 h-12 rounded-full bg-white/10 hover:bg-m3-primary disabled:opacity-30 disabled:cursor-not-allowed transition-all flex items-center justify-center text-white active:scale-90">
                        <span class="material-symbols-outlined" x-text="lang === 'he' ? 'chevron_left' : 'chevron_right'"></span>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Changelog -->
    <section id="changelog" class="max-w-4xl mx-auto px-6 py-24" x-data="{ activeVersion: 0 }">
        <h2 class="text-4xl font-black mb-16 text-center" x-text="translations[lang].changelogTitle"></h2>
        
        <div class="space-y-4">
            <template x-for="(version, index) in versions" :key="version.tag">
                <div class="m3-card overflow-hidden">
                    <button @click="activeVersion = activeVersion === index ? null : index" class="w-full p-8 flex justify-between items-center text-start m3-ripple">
                        <span class="text-2xl font-bold" x-text="'v' + version.tag + (index === 0 ? translations[lang].latestLabel : '')"></span>
                        <span class="material-symbols-outlined transition-transform duration-500" :class="activeVersion === index ? 'rotate-180 text-m3-primary' : ''">expand_more</span>
                    </button>
                    <div x-show="activeVersion === index" x-collapse>
                        <div class="px-8 pb-8 prose dark:prose-invert max-w-none text-m3-on-surface-variant text-lg leading-relaxed" 
                             x-html="renderMarkdown(version[lang])">
                        </div>
                    </div>
                </div>
            </template>
        </div>

    </section>

    <!-- Footer -->
    <footer class="bg-m3-surface-variant/30 dark:bg-m3-surface-variant-dark py-24 mt-24">
        <div class="max-w-6xl mx-auto px-6 text-center">
            <img src="Images/a-bloq-logo.png" alt="A Bloq Lock" class="w-20 h-20 mx-auto mb-8 grayscale opacity-50 contrast-125 dark:invert">
            <p class="text-2xl text-m3-on-surface-variant dark:text-m3-on-surface-dark mb-12 max-w-3xl mx-auto" x-text="translations[lang].footerDesc"></p>
            


            <div class="max-w-2xl mx-auto p-8 bg-m3-error/5 rounded-[2rem] border border-m3-error/10 mb-12">
                <p class="text-m3-error font-bold leading-relaxed" x-text="translations[lang].disclaimer"></p>
            </div>
            
            <p class="text-m3-on-surface-variant/40 dark:text-m3-on-surface-dark/20 font-mono text-xs uppercase tracking-tighter">&copy; 2026 A Bloq Lock Open Source Project.</p>
        </div>
    </footer>


</body>
</html>
